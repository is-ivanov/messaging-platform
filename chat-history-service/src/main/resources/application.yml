server:
  port: 8083

spring:
  application:
    name: chat-history-service
  datasource:
    url: jdbc:h2:file:./data/chats-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true          # http://localhost:8083/h2-console
      path: /h2-console
